name: Validate and package Ghost theme

on:
  pull_request:
  push:
    paths:
      - "ghost-theme/**"
      - "automation/**"
      - "test.mjs"
      - "package.json"
      - ".github/workflows/build-ghost-theme.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run repository validation
        run: npm test

      - name: Build Ghost theme ZIP
        id: package
        shell: bash
        run: |
          set -euo pipefail
          npm run theme:zip
          VERSION="$(node -p \"require('./ghost-theme/package.json').version\")"
          echo "zip_path=releases/UPLOAD-TO-GHOST-bomsociety-theme-v${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Upload Ghost theme artifact
        uses: actions/upload-artifact@v4
        with:
          name: bomsociety-ghost-theme
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error
