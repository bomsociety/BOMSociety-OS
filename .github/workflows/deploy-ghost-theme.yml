name: Deploy Ghost theme
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ghost-production-deployment
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      GHOST_API_VERSION: ${{ secrets.GHOST_API_VERSION || 'v6.54' }}
      GHOST_ADMIN_URL: ${{ secrets.GHOST_ADMIN_URL }}
      GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup Node
        uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: validate secrets
        run: node automation/deploy-ghost-theme.mjs validate-secrets
      - name: run tests
        run: npm test
      - name: build ZIP
        id: build
        run: |
          npm run theme:zip
          ZIP_PATH="releases/UPLOAD-TO-GHOST-bomsociety-theme-v$(node -p "require('./ghost-theme/package.json').version").zip"
          printf 'zip_path=%s\n' "$ZIP_PATH" >> "$GITHUB_OUTPUT"
      - name: inspect ZIP
        id: zip
        run: |
          node automation/deploy-ghost-theme.mjs inspect '${{ steps.build.outputs.zip_path }}' 2>&1 | tee zip-inspection.log
          printf 'sha256=%s\n' "$(sha256sum '${{ steps.build.outputs.zip_path }}' | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: upload
        id: upload
        run: |
          theme_name="$(node automation/deploy-ghost-theme.mjs upload '${{ steps.build.outputs.zip_path }}')"
          test -n "$theme_name"
          printf 'theme_name=%s\n' "$theme_name" >> "$GITHUB_OUTPUT"
      - name: activate
        id: activate
        run: node automation/deploy-ghost-theme.mjs activate '${{ steps.upload.outputs.theme_name }}'
      - name: verify Ghost origin
        id: verify-origin
        run: node automation/deploy-ghost-theme.mjs verify-origin
      - name: verify custom domain
        id: verify-custom-domain
        run: node automation/deploy-ghost-theme.mjs verify-site
      - name: workflow summary
        if: always()
        run: |
          {
            echo "## Ghost deployment verification"
            echo "- Source commit SHA: $GITHUB_SHA"
            echo "- Package version: 1.3.3"
            echo "- ZIP filename: UPLOAD-TO-GHOST-bomsociety-theme-v1.3.3.zip"
            echo "- ZIP SHA-256: ${{ steps.zip.outputs.sha256 }}"
            echo "- Installed Ghost theme name: ${{ steps.upload.outputs.theme_name }}"
            echo "- Activation result: ${{ steps.activate.outcome }}"
            echo "- Ghost origin verification result: ${{ steps.verify-origin.outcome }}"
            echo "- Custom domain verification result: ${{ steps.verify-custom-domain.outcome }}"
            echo "- Overall success: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
