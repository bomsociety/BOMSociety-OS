name: Deploy Ghost theme
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ghost-production-deployment
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      GHOST_API_VERSION: ${{ secrets.GHOST_API_VERSION || 'v6.54' }}
      GHOST_ADMIN_URL: ${{ secrets.GHOST_ADMIN_URL }}
      GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
      GHOST_SITE_URL: ${{ secrets.GHOST_SITE_URL }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup Node
        uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: validate secrets
        run: node automation/deploy-ghost-theme.mjs validate-secrets
      - name: preflight publication identity
        run: node automation/deploy-ghost-theme.mjs preflight
      - name: run tests
        run: npm test && npm run knowledge:validate && npm run validate:publishing && npm run validate:decision && npm run validate:measurement
      - name: build ZIP
        id: build
        run: |
          npm run theme:zip
          ZIP_PATH="releases/UPLOAD-TO-GHOST-bomsociety-theme-v$(node -p "require('./ghost-theme/package.json').version").zip"
          printf 'zip_path=%s\n' "$ZIP_PATH" >> "$GITHUB_OUTPUT"
      - name: inspect ZIP
        id: zip
        run: |
          ZIP_PATH='${{ steps.build.outputs.zip_path }}'
          node automation/deploy-ghost-theme.mjs inspect "$ZIP_PATH"
          echo "path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
      - name: upload
        id: upload
        run: |
          theme_name="$(node automation/deploy-ghost-theme.mjs upload "${{ steps.build.outputs.zip_path }}")"
          test -n "$theme_name"
          ! [[ "$theme_name" == *$'\r'* || "$theme_name" == *$'\n'* ]]
          printf 'theme_name=%s\n' "$theme_name" >> "$GITHUB_OUTPUT"
      - name: activate
        run: node automation/deploy-ghost-theme.mjs activate '${{ steps.upload.outputs.theme_name }}'
      - name: verify Ghost publication URL
        run: node automation/deploy-ghost-theme.mjs verify-admin
      - name: verify custom production URL
        run: node automation/deploy-ghost-theme.mjs verify-site
      - name: report complete diagnostics
        if: always()
        run: echo "Ghost deployment diagnostics completed."
