name: Deploy Ghost theme

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ghost-production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, upload, activate, and verify Ghost theme
    runs-on: ubuntu-latest
    environment: production
    env:
      # Ghost retires older Accept-Version values. Keep the installed instance's
      # supported Admin API version in this production environment secret.
      GHOST_API_VERSION: ${{ secrets.GHOST_API_VERSION || 'v6.54' }}
    steps:
      - name: Check out merged main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate and build Ghost theme
        id: build
        shell: bash
        run: |
          set -euo pipefail
          npm test
          npm run knowledge:validate
          npm run validate:publishing
          npm run validate:decision
          npm run validate:measurement
          npm run theme:zip
          VERSION="$(node -p "require('./ghost-theme/package.json').version")"
          ZIP_PATH="releases/UPLOAD-TO-GHOST-bomsociety-theme-v${VERSION}.zip"
          test -f "$ZIP_PATH"
          unzip -Z1 "$ZIP_PATH" | grep -Fxq 'package.json'
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_sha256=$(sha256sum "$ZIP_PATH" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "## BUILD SUCCESS" >> "$GITHUB_STEP_SUMMARY"
          echo "Built \`$ZIP_PATH\` from the checked-out \`main\` revision." >> "$GITHUB_STEP_SUMMARY"

      - name: Capture currently active theme
        id: previous
        env:
          GHOST_ADMIN_URL: ${{ secrets.GHOST_ADMIN_URL }}
          GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
          GHOST_SITE_URL: ${{ secrets.GHOST_SITE_URL }}
        shell: bash
        run: |
          set -euo pipefail
          theme_name="$(node automation/deploy-ghost-theme.mjs active-theme)"
          test -n "$theme_name" || { echo "Ghost did not return an active theme name." >&2; exit 1; }
          case "$theme_name" in *$'\n'*|*$'\r'*) echo "Ghost returned an unsafe active theme name." >&2; exit 1;; esac
          printf 'theme_name<<EOF\n%s\nEOF\n' "$theme_name" >> "$GITHUB_OUTPUT"
          echo "## PREVIOUS THEME CAPTURED" >> "$GITHUB_STEP_SUMMARY"
          echo "Captured active theme: \`$theme_name\`." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload and activate newly built theme in Ghost
        id: activate
        env:
          GHOST_ADMIN_URL: ${{ secrets.GHOST_ADMIN_URL }}
          GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
          GHOST_SITE_URL: ${{ secrets.GHOST_SITE_URL }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(sha256sum "${{ steps.build.outputs.zip_path }}" | awk '{print $1}')" = "${{ steps.build.outputs.zip_sha256 }}"
          theme_name="$(node automation/deploy-ghost-theme.mjs upload "${{ steps.build.outputs.zip_path }}")"
          test -n "$theme_name" || { echo "Ghost upload did not return an activated theme name." >&2; exit 1; }
          case "$theme_name" in *$'\n'*|*$'\r'*) echo "Ghost returned an unsafe activated theme name." >&2; exit 1;; esac
          printf 'theme_name<<EOF\n%s\nEOF\n' "$theme_name" >> "$GITHUB_OUTPUT"
          echo "## UPLOAD SUCCESS" >> "$GITHUB_STEP_SUMMARY"
          echo "Uploaded and activated \`$theme_name\` from the ZIP built in this run (SHA-256: \`${{ steps.build.outputs.zip_sha256 }}\`)." >> "$GITHUB_STEP_SUMMARY"
          echo "## ACTIVATION SUCCESS" >> "$GITHUB_STEP_SUMMARY"
          echo "Activated the theme returned by the upload API." >> "$GITHUB_STEP_SUMMARY"

      - name: Verify live homepage
        env:
          GHOST_ADMIN_URL: ${{ secrets.GHOST_ADMIN_URL }}
          GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
          GHOST_SITE_URL: ${{ secrets.GHOST_SITE_URL }}
          GHOST_VERIFY_TITLE: ${{ vars.GHOST_VERIFY_TITLE }}
          GHOST_VERIFY_HERO: ${{ vars.GHOST_VERIFY_HERO }}
          GHOST_VERIFY_CTA: ${{ vars.GHOST_VERIFY_CTA }}
        shell: bash
        run: |
          set -euo pipefail
          node automation/deploy-ghost-theme.mjs verify
          echo "## VERIFICATION SUCCESS" >> "$GITHUB_STEP_SUMMARY"
          echo "Confirmed the configured homepage title, hero, and CTA markers are live." >> "$GITHUB_STEP_SUMMARY"

      - name: Roll back previously active Ghost theme
        if: ${{ failure() && steps.activate.outcome == 'success' && steps.previous.outputs.theme_name != '' && steps.previous.outputs.theme_name != steps.activate.outputs.theme_name }}
        continue-on-error: true
        env:
          GHOST_ADMIN_URL: ${{ secrets.GHOST_ADMIN_URL }}
          GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
          GHOST_SITE_URL: ${{ secrets.GHOST_SITE_URL }}
        shell: bash
        run: |
          set -euo pipefail
          node automation/deploy-ghost-theme.mjs restore "${{ steps.previous.outputs.theme_name }}"
          echo "## ROLLBACK SUCCESS" >> "$GITHUB_STEP_SUMMARY"
          echo "Reactivated \`${{ steps.previous.outputs.theme_name }}\` after verification failed." >> "$GITHUB_STEP_SUMMARY"

      - name: Report unavailable rollback theme
        if: ${{ failure() && steps.activate.outcome == 'success' && steps.previous.outputs.theme_name == '' }}
        shell: bash
        run: |
          echo "## ROLLBACK SKIPPED — previous theme unavailable" >> "$GITHUB_STEP_SUMMARY"
          echo "ROLLBACK SKIPPED — previous theme unavailable"

      - name: Report rollback already active
        if: ${{ failure() && steps.activate.outcome == 'success' && steps.previous.outputs.theme_name != '' && steps.previous.outputs.theme_name == steps.activate.outputs.theme_name }}
        shell: bash
        run: |
          echo "## ROLLBACK SKIPPED — previous theme is already active" >> "$GITHUB_STEP_SUMMARY"
