name: Deploy Ghost theme

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ghost-production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, upload, activate, and verify Ghost theme
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out merged main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build and test theme
        id: build
        shell: bash
        run: |
          set -euo pipefail
          npm test
          npm run theme:zip
          VERSION="$(node -p "require('./ghost-theme/package.json').version")"
          ZIP_PATH="releases/UPLOAD-TO-GHOST-bomsociety-theme-v${VERSION}.zip"
          test -f "$ZIP_PATH"
          unzip -Z1 "$ZIP_PATH" | grep -Fxq 'package.json'
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_sha256=$(sha256sum "$ZIP_PATH" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "## Build: passed" >> "$GITHUB_STEP_SUMMARY"
          echo "Built \`$ZIP_PATH\` from the checked-out \`main\` revision." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload newly built theme to Ghost
        id: upload
        env:
          GHOST_ADMIN_URL: ${{ secrets.GHOST_ADMIN_URL }}
          GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
          GHOST_SITE_URL: ${{ secrets.GHOST_SITE_URL }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(sha256sum "${{ steps.build.outputs.zip_path }}" | awk '{print $1}')" = "${{ steps.build.outputs.zip_sha256 }}"
          THEME_NAME="$(node automation/deploy-ghost-theme.mjs upload "${{ steps.build.outputs.zip_path }}")"
          echo "theme_name=$THEME_NAME" >> "$GITHUB_OUTPUT"
          echo "## Upload: passed" >> "$GITHUB_STEP_SUMMARY"
          echo "Uploaded the ZIP built in this run (SHA-256: \`${{ steps.build.outputs.zip_sha256 }}\`)." >> "$GITHUB_STEP_SUMMARY"

      - name: Activate uploaded Ghost theme
        env:
          GHOST_ADMIN_URL: ${{ secrets.GHOST_ADMIN_URL }}
          GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
          GHOST_SITE_URL: ${{ secrets.GHOST_SITE_URL }}
        shell: bash
        run: |
          set -euo pipefail
          node automation/deploy-ghost-theme.mjs activate "${{ steps.upload.outputs.theme_name }}"
          echo "## Activation: passed" >> "$GITHUB_STEP_SUMMARY"
          echo "Activated the theme returned by the upload API." >> "$GITHUB_STEP_SUMMARY"

      - name: Verify live homepage
        env:
          GHOST_ADMIN_URL: ${{ secrets.GHOST_ADMIN_URL }}
          GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
          GHOST_SITE_URL: ${{ secrets.GHOST_SITE_URL }}
        shell: bash
        run: |
          set -euo pipefail
          node automation/deploy-ghost-theme.mjs verify
          echo "## Verification: passed" >> "$GITHUB_STEP_SUMMARY"
          echo "Confirmed all required homepage text is live." >> "$GITHUB_STEP_SUMMARY"
