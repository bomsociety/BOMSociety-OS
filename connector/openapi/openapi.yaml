openapi: 3.1.0

info:
  title: BOMSociety OS Connector
  description: Manage BOMSociety Ghost content and the BOMSociety OS Google Drive workspace.
  version: 1.4.0

servers:
  - url: https://bomsociety-ghost-bridge.krishnaehb.workers.dev

paths:
  /:
    post:
      operationId: manageBOMSociety
      summary: Manage BOMSociety Ghost and Google Drive

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectorRequest"

      responses:
        "200":
          description: Successful connector response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorResponse"

        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorResponse"

        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorResponse"

        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorResponse"

        "500":
          description: Connector error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorResponse"

        "502":
          description: Upstream Apps Script error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorResponse"

components:
  schemas:
    ConnectorRequest:
      type: object
      additionalProperties: false

      required:
        - connector_token
        - action

      properties:
        connector_token:
          type: string
          description: Private connector token.

        action:
          type: string
          enum:
            - test
            - list_posts
            - list_pages
            - create_draft
            - publish_post
            - upsert_page
            - get_page
            - site_settings
            - theme_info
            - drive_setup
            - drive_status
            - list_files
            - read_file
            - write_file
            - mkdir
            - move_file
            - copy_file
            - delete_file
            - zip_project
            - write_project
            - read_project

        id:
          type: string
          description: Ghost page ID.

        limit:
          type: integer
          minimum: 1
          maximum: 100

        title:
          type: string

        html:
          type: string

        slug:
          type: string

        status:
          type: string
          enum:
            - draft
            - published

        custom_excerpt:
          type: string

        tags:
          type: array
          items:
            type: string

        confirm_publish:
          type: boolean
          description: Must be true for live publishing.

        path:
          type: string
          description: Path relative to the BOMSociety OS Google Drive root folder.

        contents:
          type: string
          description: UTF-8 text or base64-encoded file contents.

        mime_type:
          type: string
          description: MIME type for a Google Drive file.

        encoding:
          type: string
          enum:
            - utf-8
            - base64

        overwrite:
          type: boolean

        recursive:
          type: boolean

        max_depth:
          type: integer
          minimum: 0
          maximum: 25

        max_bytes:
          type: integer
          minimum: 1
          maximum: 5000000

        source_path:
          type: string
          description: Source path relative to the BOMSociety OS root folder.

        destination_path:
          type: string
          description: Destination path relative to the BOMSociety OS root folder.

        confirm_delete:
          type: boolean
          description: Must be true to move a file or folder to Trash.

        zip_name:
          type: string
          description: Optional ZIP filename.

        project_name:
          type: string
          description: Name of the project, release, or batch.

        files:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: "#/components/schemas/ProjectFileInput"

        max_files:
          type: integer
          minimum: 1
          maximum: 500

        max_total_bytes:
          type: integer
          minimum: 1
          maximum: 10000000

    ProjectFileInput:
      type: object
      additionalProperties: false

      required:
        - path
        - contents

      properties:
        path:
          type: string
          description: Destination path relative to the BOMSociety OS root folder.

        contents:
          type: string
          description: UTF-8 text or base64-encoded contents.

        mime_type:
          type: string

        encoding:
          type: string
          enum:
            - utf-8
            - base64

    ConnectorResponse:
      type: object
      additionalProperties: true

      properties:
        success:
          type: boolean

        action:
          type:
            - string
            - "null"

        operation:
          type:
            - string
            - "null"

        error:
          type:
            - string
            - "null"

        note:
          type:
            - string
            - "null"

        configured:
          type:
            - boolean
            - "null"

        id:
          type:
            - string
            - "null"

        name:
          type:
            - string
            - "null"

        title:
          type:
            - string
            - "null"

        slug:
          type:
            - string
            - "null"

        status:
          type:
            - string
            - "null"

        url:
          type:
            - string
            - "null"

        root_url:
          type:
            - string
            - "null"

        folder_url:
          type:
            - string
            - "null"

        root_folder_id:
          type:
            - string
            - "null"

        root_folder_name:
          type:
            - string
            - "null"

        folder_id:
          type:
            - string
            - "null"

        project_name:
          type:
            - string
            - "null"

        manifest:
          type:
            - string
            - object
            - "null"
          additionalProperties: true
          properties:
            system:
              type:
                - string
                - "null"
            version:
              type:
                - string
                - "null"
            workspace_type:
              type:
                - string
                - "null"
            root_folder_id:
